name: Telegram Signals

on:
  schedule:
    # Tunisia time (UTC+1 assumed). Update if the offset changes.
    - cron: "55 7 * * *"   # 08:55 Tunisia -> morning session prep
    - cron: "25 14 * * *"  # 15:25 Tunisia -> evening session prep
    - cron: "0 12 * * *"   # 13:00 Tunisia -> conversion post
    - cron: "0 17 * * *"   # 18:00 Tunisia -> daily recap
    - cron: "0 18 * * 0"   # Sunday 19:00 Tunisia -> weekly recap
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "morning"
        type: choice
        options:
          - all
          - morning
          - evening
          - recap
          - day

concurrency:
  group: telegram-signals
  cancel-in-progress: true

jobs:
  run:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: .ghost_state.json
          key: ghost-state-${{ github.run_id }}
          restore-keys: |
            ghost-state-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Select mode
        id: select
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          case "${{ github.event.schedule }}" in
            "55 7 * * *") mode="morning" ;;
            "25 14 * * *") mode="evening" ;;
            "0 12 * * *"|"0 17 * * *"|"0 18 * * 0") mode="recap" ;;
            *) mode="recap" ;;
          esac
          echo "mode=$mode" >> $GITHUB_OUTPUT

      - name: Run signal script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_USERNAME: ${{ secrets.CHANNEL_USERNAME }}
          VIP_CHANNEL_USERNAME: ${{ secrets.VIP_CHANNEL_USERNAME }}
        run: |
          ghost-send \
            --mode "${{ steps.select.outputs.mode }}" \
            --auto-plan \
            --auto-win-rate 0.9 \
            --max-late-seconds 600
